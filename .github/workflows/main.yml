name: CI
on:

  workflow_dispatch:
  pull_request:
  push:
    branches:
    - main

  schedule:
    - cron: '0 2 * * *' # run at 2 AM UTC

jobs:
  unix:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment-dev.yml

      - name: CMake configure
        shell: bash -l {0}
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
            -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
            -D CMAKE_INSTALL_LIBDIR=lib

      - name: Build
        shell: bash -l {0}
        run: |
          cd build
          make -j8

      - name: Install
        shell: bash -l {0}
        run: |
          cd build
          make install

      - name: Test
        shell: micromamba-shell {0}
        run: |
          cd test
          pytest . --reruns 5

  win:

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment-dev.yml
          init-shell: cmd.exe
          environment-name: xeus-r

      - name: Micromamba shell hook
        shell: powershell
        run: |
          micromamba shell hook -s cmd.exe --root-prefix C:\Users\runneradmin\micromamba-root

      - name: CMake configure
        shell: cmd /C call {0}
        run: |
          call C:\Users\runneradmin\micromamba-root\condabin\micromamba.bat activate xeus-r
          mkdir -p build
          cd build
          cmake .. ^
            -G "NMake Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DXEUS_BUILD_TESTS=ON ^
            -DCMAKE_PREFIX_PATH="%CONDA_PREFIX%\Library" ^
            -DCMAKE_INSTALL_PREFIX="%CONDA_PREFIX%\Library"

      - name: Build & install
        shell: cmd /C call {0}
        run: |
          call C:\Users\runneradmin\micromamba-root\condabin\micromamba.bat activate xeus-r
          cd build
          set CL=/MP
          nmake install
          md %CONDA_PREFIX%\share\jupyter\kernels\xr
          xcopy %CONDA_PREFIX%\Library\share\jupyter\kernels\xr %CONDA_PREFIX%\share\jupyter\kernels\xr /F /Y

      - name: Test
        shell: cmd /C call {0}
        run: |
          call C:\Users\runneradmin\micromamba-root\condabin\micromamba.bat activate xeus-r
          cd test
          pytest -sv test_xr_kernel.py

name: xeus-r-wasm-host
channels:
  - https://repo.prefix.dev/emscripten-forge-4x
  - conda-forge
dependencies:
  # Host dependencies
  - nlohmann_json
  - nlohmann_json-abi
  - xeus-lite >=5.0,<6.0
  - xeus
  - pcre2
  - zlib
  - xz
  - bzip2
  - libiconv
  - libflang
  - r-base
  # Run dependencies
  - r-rlang
  - r-evaluate
  - r-glue
  - r-r6
  - r-jsonlite
  - r-glue
  - r-cli
  - r-repr
  - r-irdisplay
  - r-dplyr
  # Test dependencies
  - r-htmltools
  - r-ggplot2
  - r-munsell
  - r-colorspace

